name: Supabase keepalive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: supabase-keepalive
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Ping Supabase Postgres
        env:
          NODE_OPTIONS: --dns-result-order=ipv4first
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
        run: |
          node --input-type=module <<'NODE'
          import postgres from 'postgres';

          const connectionString =
            process.env.POSTGRES_URL_NON_POOLING ||
            process.env.POSTGRES_URL;

          if (!connectionString) {
            console.log('Skipping Supabase keepalive because POSTGRES_URL_NON_POOLING and POSTGRES_URL are not configured in GitHub secrets.');
            process.exit(0);
          }

          const sql = postgres(connectionString, { ssl: 'require' });

          try {
            await sql`select 1 as alive`;
            console.log('Supabase keepalive query succeeded.');
          } finally {
            await sql.end();
          }
          NODE